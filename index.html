<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tester</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0a0a0a;
    color: #e5e7eb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  button { font-family: inherit; }
  kbd {
    background: #1f2937;
    border: 1px solid #374151;
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 11px;
    font-family: ui-monospace, monospace;
    color: #d1d5db;
    margin: 0 2px;
  }
  code {
    background: #1f2937;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: #fbbf24;
  }
  pre code { background: transparent; padding: 0; color: #e5e7eb; }
  input, textarea {
    font-family: inherit;
  }
  input:focus, textarea:focus {
    border-color: #3b82f6 !important;

    display: flex;

    color: #9ca3af;
  }
</style>
</head>
<body>
<div id="root"><div class="loading">Načítání...</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

const STORAGE_KEY = 'tester_sets_v2';

// --- Jednoduché ikony jako SVG inline ---
const Icon = ({ children, size = 16 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}>
    {children}
  </svg>
);
const IconUpload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
const IconFile = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></Icon>;
const IconTrash = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></Icon>;
const IconPlay = (p) => <Icon {...p}><polygon points="5 3 19 12 5 21 5 3"/></Icon>;
const IconReset = (p) => <Icon {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></Icon>;
const IconChevronLeft = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6"/></Icon>;
const IconChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6"/></Icon>;
const IconCheck = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
const IconAlert = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
const IconX = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
const IconShuffle = (p) => <Icon {...p}><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></Icon>;
const IconDownload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;

const shuffleArray = (array) => {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
};

const parseText = (text) => {
  const lines = text.split('\n');
  const questions = [];
  const errors = [];
  let currentQuestion = null;

  lines.forEach((rawLine, idx) => {
    const line = rawLine.trim();
    
    if (!line) {
      if (currentQuestion && currentQuestion.options.length > 0) {
        shuffleArray(currentQuestion.options);
        questions.push(currentQuestion);
        currentQuestion = null;
      }
      return;
    }

    if (line.startsWith('+') || line.startsWith('-')) {
      if (!currentQuestion) {
        errors.push(`Řádek ${idx + 1}: Odpověď bez předchozí otázky.`);
        return;
      }
      const isCorrect = line.startsWith('+');
      const ansText = line.substring(1).trim();
      currentQuestion.options.push({ text: ansText, isCorrect });
      
    } else {
      if (currentQuestion) {
        if (currentQuestion.options.length > 0) {
          shuffleArray(currentQuestion.options);
          questions.push(currentQuestion);
        } else {
          errors.push(`Řádek ${idx}: Otázka nemá žádné odpovědi a byla přeskočena.`);
        }
      }
      currentQuestion = { question: line, options: [] };
    }
  });

  if (currentQuestion && currentQuestion.options.length > 0) {
    shuffleArray(currentQuestion.options);
    questions.push(currentQuestion);
  } else if (currentQuestion) {
    errors.push(`Poslední otázka nemá žádné odpovědi.`);
  }

  return { questions, errors };
};

function countStats(cards) {
  const stats = { correct: 0, partial: 0, wrong: 0, unanswered: 0 };
  cards.forEach((c) => {
    if (c.status === 'correct') stats.correct++;
    else if (c.status === 'partial') stats.partial++;
    else if (c.status === 'wrong') stats.wrong++;
    else stats.unanswered++;
  });
  return stats;
}

function FlashcardsApp() {
  const [tab, setTab] = useState('home');
  const [sets, setSets] = useState([]);
  const [studyId, setStudyId] = useState(null);
  const [quickTestConfig, setQuickTestConfig] = useState(null);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setSets(JSON.parse(raw));
    } catch (e) { console.error(e); }
  }, []);

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sets)); }
    catch (e) { console.error(e); }
  }, [sets]);

  const addSet = (name, questions) => {
    const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    const newSet = {
      id, name,
      cards: questions.map((q, i) => ({ ...q, id: `${id}_${i}`, status: 'unanswered' })),
      createdAt: new Date().toISOString(),
    };
    setSets((prev) => [newSet, ...prev]);
    return id;
  };

  const deleteSet = (id) => {
    setSets((prev) => prev.filter((s) => s.id !== id));
    if (studyId === id) setStudyId(null);
  };

  const updateCardStatus = (setId, cardIdx, status) => {
    setSets((prev) => prev.map((s) => {
      if (s.id !== setId) return s;
      const cards = s.cards.map((c, i) => i === cardIdx ? { ...c, status } : c);
      return { ...s, cards };
    }));
  };

  const resetSet = (id) => {
    setSets((prev) => prev.map((s) => {
      if (s.id !== id) return s;
      return { ...s, cards: s.cards.map((c) => ({ ...c, status: 'unanswered' })) };
    }));
  };

  const importSets = (newSets, mode) => {
    const reId = (set) => {
      const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      return { ...set, id, cards: set.cards.map((c, i) => ({ ...c, id: `${id}_${i}` })) };
    };
    if (mode === 'replace') {
      setSets(newSets.map(reId));
    } else {
      setSets((prev) => [...prev, ...newSets.map(reId)]);
    }
  };

  if (quickTestConfig) {
    const qtSet = sets.find((s) => s.id === quickTestConfig.setId);
    if (qtSet) {
      return <QuickStudyView set={qtSet} count={quickTestConfig.count} onExit={() => setQuickTestConfig(null)} />;
    }
  }

  const studyingSet = studyId ? sets.find((s) => s.id === studyId) : null;

  if (studyingSet) {
    return (
      <StudyView
        set={studyingSet}
        onExit={() => setStudyId(null)}
        onStatusChange={(idx, status) => updateCardStatus(studyingSet.id, idx, status)}
        onReset={() => resetSet(studyingSet.id)}
      />
    );
  }

  return (
    <div style={s.app}>
      <Header tab={tab} onTabChange={setTab} />
      <main style={s.main}>
        {tab === 'home' && <HomeTab onCreate={addSet} onGoToSets={() => setTab('mysets')} hasSets={sets.length > 0} />}
        {tab === 'testing' && <TestingTab sets={sets} />}
        {tab === 'mysets' && <MySetsTab sets={sets} onStudy={setStudyId} onDelete={deleteSet} onReset={resetSet} onCreate={() => setTab('home')} onQuickTest={(setId, count) => setQuickTestConfig({ setId, count })} />}
        {tab === 'importexport' && <ImportExportTab sets={sets} onImport={importSets} />}
        {tab === 'guide' && <GuideTab />}
      </main>
    </div>
  );
}

function Header({ tab, onTabChange }) {
  const tabs = [
    { id: 'home', label: 'Domů' },
    { id: 'testing', label: 'Testování' },
    { id: 'mysets', label: 'Moje testy' },
    { id: 'importexport', label: 'Import / Export' },
    { id: 'guide', label: 'Návod' },
  ];
  return (
    <header style={s.header}>
      <div style={s.headerInner}>
        <div style={s.logo}>Tester</div>
        <nav style={s.nav}>
          {tabs.map((t) => (
            <button key={t.id} onClick={() => onTabChange(t.id)}
              style={{ ...s.navBtn, color: tab === t.id ? '#fff' : '#9ca3af', fontWeight: tab === t.id ? 600 : 400 }}>
              {t.label}
            </button>
          ))}
        </nav>
      </div>
    </header>
  );
}

function HomeTab({ onCreate, onGoToSets, hasSets }) {
  const [name, setName] = useState('');
  const [text, setText] = useState('');
  const [parsed, setParsed] = useState(null);
  const [errors, setErrors] = useState([]);
  const [createdName, setCreatedName] = useState('');
  const fileRef = useRef(null);
  const textareaRef = useRef(null);

  const updateParse = (newText) => {
    setText(newText);
    if (!newText.trim()) { setParsed(null); setErrors([]); return; }
    const { questions, errors } = parseText(newText);
    setParsed(questions);
    setErrors(errors);
  };

  const insertTextTemplate = (prefix) => {
    const textarea = textareaRef.current;
    if (!textarea) return;
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const currentText = textarea.value;
    const before = currentText.substring(0, start);
    const after = currentText.substring(end);
    const symbol = before.endsWith('\n') || before === '' ? prefix : `\n${prefix}`;
    const newText = before + symbol + after;
    updateParse(newText);
    
    setTimeout(() => {
      textarea.focus();
      textarea.selectionStart = textarea.selectionEnd = start + symbol.length;
    }, 0);
  };

  const handleFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setName(file.name.replace(/\.[^.]+$/, ''));
    const reader = new FileReader();
    reader.onload = (ev) => updateParse(String(ev.target?.result || ''));
    reader.readAsText(file, 'UTF-8');
  };

  const handleCreate = () => {
    if (!parsed || parsed.length === 0) return;
    const finalName = name.trim() || `Test ${new Date().toLocaleDateString('cs-CZ')}`;
    onCreate(finalName, parsed);
    setCreatedName(finalName);
    setName(''); setText(''); setParsed(null); setErrors([]);
    if (fileRef.current) fileRef.current.value = '';
    setTimeout(() => setCreatedName(''), 4000);
  };

  return (
    <div style={s.container}>
      <h1 style={s.h1}>Vložit nový test</h1>
      <p style={s.subtitle}>Nahrajte .txt soubor nebo vložte text ve formátu s + a -</p>

      <div style={s.card}>
        <label style={s.label}>Název testu</label>
        <input type="text" value={name} onChange={(e) => setName(e.target.value)}
          placeholder="např. Mikroekonomie I - Zkouška" style={s.input} />

        <div style={{ marginTop: 20 }}>
          <label style={s.label}>Nahrát soubor</label>
          <div style={s.fileRow}>
            <button onClick={() => fileRef.current?.click()} style={s.fileBtn}>
              <IconUpload />Vybrat .txt
            </button>
            <input ref={fileRef} type="file" accept=".txt,.csv,.md" onChange={handleFile} style={{ display: 'none' }} />
            <span style={s.fileHint}>nebo vložte text ručně níže</span>
          </div>
        </div>

        <div style={{ marginTop: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 8 }}>
            <label style={{ ...s.label, margin: 0 }}>Text otázek</label>
            <div style={{ display: 'flex', gap: 6 }}>
              <button type="button" onClick={() => insertTextTemplate('+ ')} style={s.formatBtn}>+ Správná odpověď</button>
              <button type="button" onClick={() => insertTextTemplate('- ')} style={s.formatBtn}>- Špatná odpověď</button>
            </div>
          </div>
          <textarea ref={textareaRef} value={text} onChange={(e) => updateParse(e.target.value)}
            placeholder={`Text první otázky
+ první správná odpověď
- první špatná odpověď
- druhá špatná odpověď

Text druhé otázky
- první špatná odpověď
+ první správná odpověď
+ druhá správná odpověď`}
            style={s.textarea} spellCheck={false} />
        </div>

        {parsed !== null && (
          <div style={s.parseStatus}>
            <div style={s.parseStatusRow}>
              <IconCheck size={16} />
              <span><strong>{parsed.length}</strong> otázek nalezeno</span>
            </div>
            {errors.length > 0 && (
              <div style={{ ...s.parseStatusRow, color: '#f59e0b', marginTop: 8 }}>
                <IconAlert size={16} />
                <span>Varování: {errors.slice(0, 2).join('; ')}{errors.length > 2 ? ` (+${errors.length - 2})` : ''}</span>
              </div>
            )}
          </div>
        )}

        {parsed && parsed.length > 0 && (
          <div style={{ marginTop: 16 }}>
            <div style={s.previewTitle}>Náhled prvních otázek</div>
            {parsed.slice(0, 2).map((q, i) => (
              <div key={i} style={s.previewCard}>
                <div style={{ color: '#fff', fontWeight: 600, marginBottom: 8 }}>{q.question}</div>
                {q.options.map((opt, j) => (
                  <div key={j} style={{ color: opt.isCorrect ? '#22c55e' : '#ef4444', marginLeft: 12 }}>
                    {opt.isCorrect ? '+ ' : '- '} {opt.text}
                  </div>
                ))}
              </div>
            ))}
            {parsed.length > 2 && <div style={s.previewMore}>... a {parsed.length - 2} dalších</div>}
          </div>
        )}

        <button onClick={handleCreate} disabled={!parsed || parsed.length === 0}
          style={{ ...s.primaryBtn, opacity: (!parsed || parsed.length === 0) ? 0.4 : 1, cursor: (!parsed || parsed.length === 0) ? 'not-allowed' : 'pointer', marginTop: 24 }}>
          Vytvořit test
        </button>

        {createdName && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 16, padding: '12px 16px', background: '#052e16', border: '1px solid #166534', borderRadius: 8, color: '#22c55e', fontSize: 14 }}>
            <IconCheck size={16} />
            <span>Test <strong>"{createdName}"</strong> byl vytvořen — formulář je připraven na další import.</span>
          </div>
        )}
      </div>

      {hasSets && (
        <div style={{ marginTop: 16, textAlign: 'center' }}>
          <button onClick={onGoToSets} style={s.linkBtn}>Zobrazit moje testy →</button>
        </div>
      )}
    </div>
  );
}

function MySetsTab({ sets, onStudy, onDelete, onReset, onCreate, onQuickTest }) {
  const [modalSetId, setModalSetId] = useState(null);

  if (sets.length === 0) {
    return (
      <div style={s.container}>
        <div style={s.emptyState}>
          <IconFile size={48} />
          <h2 style={{ ...s.h2, marginTop: 16 }}>Zatím žádné testy</h2>
          <p style={s.subtitle}>Nahrajte soubor s otázkami a začněte se učit.</p>
          <button onClick={onCreate} style={{ ...s.primaryBtn, marginTop: 16, width: 'auto', padding: '12px 24px' }}>Nahrát test</button>
        </div>
      </div>
    );
  }

  return (
    <div style={s.container}>
      <h1 style={s.h1}>Moje testy</h1>
      <p style={s.subtitle}>{sets.length} {sets.length === 1 ? 'test' : sets.length < 5 ? 'testy' : 'testů'} uloženo</p>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {sets.map((set) => {
          const stats = countStats(set.cards);
          return (
            <div key={set.id} style={s.setCard}>
              <div style={s.setHeader}>
                <div>
                  <h3 style={s.setName}>{set.name}</h3>
                  <div style={s.setMeta}>{set.cards.length} otázek · {new Date(set.createdAt).toLocaleDateString('cs-CZ')}</div>
                </div>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  <button onClick={() => setModalSetId(set.id)} style={s.testBtn}>
                    <IconShuffle size={14} />Testovat se
                  </button>
                  <button onClick={() => onStudy(set.id)} style={s.practiceBtn}>
                    <IconPlay size={14} />Procvičovat
                  </button>
                  <button onClick={() => { if (confirm(`Smazat test "${set.name}"?`)) onDelete(set.id); }} style={s.iconBtn} title="Smazat">
                    <IconTrash size={14} />
                  </button>
                </div>
              </div>

              <div style={s.statBar}>
                <StatPill label="Správně" count={stats.correct} color="#22c55e" />
                <StatPill label="Částečně" count={stats.partial} color="#f59e0b" />
                <StatPill label="Špatně" count={stats.wrong} color="#ef4444" />
                <StatPill label="Neodp." count={stats.unanswered} color="#6b7280" />
              </div>

              <CardGrid cards={set.cards} compact />

              {stats.correct + stats.partial + stats.wrong > 0 && (
                <button onClick={() => { if (confirm('Resetovat všechny odpovědi v tomto testu?')) onReset(set.id); }} style={s.resetLink}>
                  <IconReset size={12} />Resetovat postup
                </button>
              )}
            </div>
          );
        })}
      </div>
      {modalSetId && (
        <QuickTestModal
          maxCount={sets.find((s) => s.id === modalSetId)?.cards.length || 0}
          onStart={(count) => { onQuickTest(modalSetId, count); setModalSetId(null); }}
          onClose={() => setModalSetId(null)}
        />
      )}
    </div>
  );
}

function StatPill({ label, count, color }) {
  return (
    <div style={{ ...s.statPill, borderColor: color + '40' }}>
      <span style={{ ...s.statDot, background: color }} />
      <span style={{ color: '#9ca3af' }}>{label}</span>
      <span style={{ fontWeight: 600, color }}>{count}</span>
    </div>
  );
}

function CardGrid({ cards, activeIdx, onJump, compact = false }) {
  const colorFor = (status) => {
    if (status === 'correct') return '#22c55e';
    if (status === 'partial') return '#f59e0b';
    if (status === 'wrong') return '#ef4444';
    return '#374151';
  };
  const size = compact ? 9 : 12;
  const gap = compact ? 4 : 6;
  return (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap, marginTop: compact ? 12 : 0 }}>
      {cards.map((c, i) => {
        const isActive = activeIdx === i;
        return (
          <button key={i} onClick={() => onJump && onJump(i)} disabled={!onJump}
            title={`Otázka ${i + 1}`}
            style={{
              width: size, height: size, borderRadius: '50%',
              background: colorFor(c.status),
              border: isActive ? '2px solid #fff' : '2px solid transparent',
              cursor: onJump ? 'pointer' : 'default', padding: 0,
              boxShadow: isActive ? '0 0 0 2px #3b82f6' : 'none',
            }} />
        );
      })}
    </div>
  );
}

function QuickTestModal({ maxCount, onStart, onClose }) {
  const [count, setCount] = useState(Math.min(10, maxCount));

  const handleSubmit = (e) => {
    e.preventDefault();
    onStart(Math.max(1, Math.min(maxCount, count)));
  };

  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  return (
    <div style={s.modalOverlay} onClick={onClose}>
      <div style={s.modal} onClick={(e) => e.stopPropagation()}>
        <h3 style={{ color: '#fff', margin: '0 0 8px', fontSize: 18 }}>Procvičovací test</h3>
        <p style={{ color: '#9ca3af', margin: '0 0 20px', fontSize: 14 }}>
          Vylosuje se náhodný výběr otázek. Po dokončení kola můžeš zamíchat a zkoušet znovu.
        </p>
        <form onSubmit={handleSubmit}>
          <label style={s.label}>Počet otázek (z {maxCount})</label>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8 }}>
            <input
              type="number" min={1} max={maxCount} value={count}
              onChange={(e) => setCount(Math.max(1, Math.min(maxCount, parseInt(e.target.value) || 1)))}
              style={{ ...s.input, width: 80 }}
              autoFocus
            />
            <span style={{ color: '#9ca3af', fontSize: 14 }}>z celkových {maxCount}</span>
          </div>
          <input
            type="range" min={1} max={maxCount} value={count}
            onChange={(e) => setCount(parseInt(e.target.value))}
            style={{ width: '100%', marginBottom: 24, accentColor: '#2563eb' }}
          />
          <div style={{ display: 'flex', gap: 10 }}>
            <button type="submit" style={{ ...s.primaryBtn, width: 'auto', flex: 1 }}>
              Začít test
            </button>
            <button type="button" onClick={onClose} style={{ ...s.iconBtn, padding: '8px 16px', fontSize: 13 }}>
              Zrušit
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function QuickStudyView({ set, count, onExit }) {
  const makeRound = useCallback(() => {
    const shuffled = [...set.cards];
    shuffleArray(shuffled);
    return shuffled.slice(0, count).map((c) => ({ ...c, status: 'unanswered' }));
  }, [set.cards, count]);

  const [cards, setCards] = useState(() => makeRound());
  const [idx, setIdx] = useState(0);
  const [roundKey, setRoundKey] = useState(0);
  const [selectedOptions, setSelectedOptions] = useState([]);
  const [evaluated, setEvaluated] = useState(false);
  const [aiCopied, setAiCopied] = useState(false);
  const [currentOptions, setCurrentOptions] = useState([]);
  const [opKbMode, setOpKbMode] = useState(false);
  const [opKbIdx, setOpKbIdx] = useState(0);
  const opKbModeRef = useRef(false);
  const opKbIdxRef = useRef(0);
  useEffect(() => { opKbModeRef.current = opKbMode; }, [opKbMode]);
  useEffect(() => { opKbIdxRef.current = opKbIdx; }, [opKbIdx]);

  const reshuffleCards = useCallback(() => {
    setCards(makeRound());
    setIdx(0);
    setRoundKey((k) => k + 1);
  }, [makeRound]);

  const card = cards[idx];
  const stats = countStats(cards);
  const total = cards.length;
  const answered = stats.correct + stats.partial + stats.wrong;
  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;
  const allAnswered = answered === total;

  const next = useCallback(() => { setIdx((i) => Math.min(i + 1, total - 1)); }, [total]);
  const prev = useCallback(() => { setIdx((i) => Math.max(i - 1, 0)); }, []);

  useEffect(() => {
    setSelectedOptions([]);
    setEvaluated(false);
    setAiCopied(false);
    setOpKbMode(false);
    setOpKbIdx(0);
    if (card && card.options) {
      const shuffled = [...card.options];
      shuffleArray(shuffled);
      setCurrentOptions(shuffled);
    }
  }, [idx, roundKey]);

  const toggleOption = useCallback((optIdx) => {
    if (evaluated) return;
    setSelectedOptions((prev) =>
      prev.includes(optIdx) ? prev.filter((i) => i !== optIdx) : [...prev, optIdx]
    );
  }, [evaluated]);

  const handleEvaluate = useCallback(() => {
    if (evaluated) { next(); return; }

    let correctTotal = 0, selectedCorrect = 0, selectedWrong = 0;
    currentOptions.forEach((opt, i) => {
      if (opt.isCorrect) correctTotal++;
      if (selectedOptions.includes(i)) {
        if (opt.isCorrect) selectedCorrect++;
        else selectedWrong++;
      }
    });

    let status = 'wrong';
    if (selectedWrong === 0 && selectedCorrect === correctTotal && correctTotal > 0) status = 'correct';
    else if (selectedWrong === 0 && selectedCorrect > 0) status = 'partial';

    setCards((prev) => prev.map((c, i) => i === idx ? { ...c, status } : c));
    setEvaluated(true);
  }, [evaluated, currentOptions, selectedOptions, idx, next]);

  const copyAiPrompt = () => {
    let promptText = `Ahoj, potřebuji vysvětlit následující otázku z testu:\n\n`;
    promptText += `Otázka: ${card.question}\n\nMožnosti:\n`;
    currentOptions.forEach((opt, i) => {
      const isSelected = selectedOptions.includes(i);
      promptText += `${opt.isCorrect ? '[SPRÁVNÁ]' : '[ŠPATNÁ]'} — ${opt.text} ${isSelected ? '(Tuto možnost jsem ZAŠKRTL)' : '(Tuto možnost jsem NEZAŠKRTL)'}\n`;
    });
    let correctTotal = 0, selectedCorrect = 0, selectedWrong = 0;
    currentOptions.forEach((opt, i) => {
      if (opt.isCorrect) correctTotal++;
      if (selectedOptions.includes(i)) {
        if (opt.isCorrect) selectedCorrect++;
        else selectedWrong++;
      }
    });
    const st = (selectedWrong === 0 && selectedCorrect === correctTotal && correctTotal > 0) ? 'correct' : ((selectedWrong === 0 && selectedCorrect > 0) ? 'partial' : 'wrong');
    promptText += `\nMoje odpověď byla vyhodnocena jako: ${st === 'partial' ? 'ČÁSTEČNĚ SPRÁVNÁ' : 'ŠPATNÁ'}.\n\n`;
    promptText += `Můžeš mi prosím podrobně vysvětlit, proč je správná odpověď správná a proč ty ostatní jsou nesprávné?`;
    navigator.clipboard.writeText(promptText);
    setAiCopied(true);
    setTimeout(() => setAiCopied(false), 2500);
  };

  useEffect(() => {
    const onMouse = () => { setOpKbMode(false); };
    window.addEventListener('mousedown', onMouse);
    return () => window.removeEventListener('mousedown', onMouse);
  }, []);

  useEffect(() => {
    const h = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); handleEvaluate(); }
      else if (e.key === 'ArrowRight') { setOpKbMode(false); next(); }
      else if (e.key === 'ArrowLeft') { setOpKbMode(false); prev(); }
      else if (e.key === 'Escape') onExit();
      else if ((e.key === 'ArrowUp' || e.key === 'ArrowDown') && !evaluated) {
        e.preventDefault();
        if (!opKbModeRef.current) {
          setOpKbMode(true);
          setOpKbIdx(0);
        } else {
          setOpKbIdx((p) => e.key === 'ArrowUp' ? Math.max(0, p - 1) : Math.min(currentOptions.length - 1, p + 1));
        }
      } else if (e.key === 'Shift' && opKbModeRef.current && !evaluated) {
        toggleOption(opKbIdxRef.current);
      } else if (e.key >= '1' && e.key <= '9' && !evaluated) {
        const index = parseInt(e.key, 10) - 1;
        if (index >= 0 && index < currentOptions.length) toggleOption(index);
      }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [evaluated, next, prev, handleEvaluate, onExit, toggleOption, currentOptions.length]);

  let isIncorrect = false;
  if (evaluated) {
    let correctTotal = 0, selectedCorrect = 0, selectedWrong = 0;
    currentOptions.forEach((opt, i) => {
      if (opt.isCorrect) correctTotal++;
      if (selectedOptions.includes(i)) {
        if (opt.isCorrect) selectedCorrect++;
        else selectedWrong++;
      }
    });
    const st = (selectedWrong === 0 && selectedCorrect === correctTotal && correctTotal > 0) ? 'correct' : ((selectedWrong === 0 && selectedCorrect > 0) ? 'partial' : 'wrong');
    if (st === 'wrong' || st === 'partial') isIncorrect = true;
  }

  return (
    <div style={s.app}>
      <Header tab="mysets" onTabChange={() => onExit()} />
      <main style={s.main}>
        <div style={{ maxWidth: 1100, margin: '0 auto' }}>
          <div style={s.studyTopRow}>
            <button onClick={onExit} style={s.backBtn}>
              <IconX size={16} />Ukončit
            </button>
            <div style={s.studyTitle}>
              {set.name} <span style={{ color: '#9ca3af', fontWeight: 400, fontSize: 14 }}>— procvičování ({count} otázek)</span>
            </div>
            <div style={{ color: '#9ca3af', fontSize: 13 }}>Otázka {idx + 1} / {total}</div>
          </div>

          <div style={s.progressBar}>
            <div style={{ ...s.progressFill, width: `${pct}%` }} />
          </div>

          {allAnswered && (
            <div style={{ background: '#0c1a2e', border: '1px solid #1e3a5f', borderRadius: 12, padding: 20, marginBottom: 24, textAlign: 'center' }}>
              <div style={{ color: '#60a5fa', fontWeight: 700, fontSize: 20, marginBottom: 8 }}>Kolo dokončeno!</div>
              <div style={{ color: '#9ca3af', marginBottom: 16, fontSize: 14 }}>
                Správně: <strong style={{ color: '#22c55e' }}>{stats.correct}</strong> · Částečně: <strong style={{ color: '#f59e0b' }}>{stats.partial}</strong> · Špatně: <strong style={{ color: '#ef4444' }}>{stats.wrong}</strong>
              </div>
              <button onClick={reshuffleCards} style={{ ...s.primaryBtn, width: 'auto', padding: '12px 28px' }}>
                🔀 Nové kolo — {count} náhodných otázek
              </button>
            </div>
          )}

          <div style={s.studyLayout}>
            <div style={{ display: 'flex', flexDirection: 'column' }}>
              <div style={s.questionContainer}>
                <div style={s.questionText}>{card.question}</div>
                <div style={s.optionsList}>
                  {currentOptions.map((opt, i) => {
                    const isSelected = selectedOptions.includes(i);
                    const isOpKbCursor = opKbMode && opKbIdx === i && !evaluated;
                    let bg = '#1f2937', borderColor = '#374151', icon = null;
                    let cbBg = isSelected ? '#3b82f6' : 'transparent';
                    let cbBorder = isSelected ? '#3b82f6' : '#6b7280';
                    let boxShadow = 'none';

                    if (evaluated) {
                      if (opt.isCorrect && isSelected) {
                        bg = '#14532d'; borderColor = '#22c55e';
                        cbBg = '#22c55e'; cbBorder = '#22c55e';
                        icon = <span style={{ color: '#22c55e' }}>✓</span>;
                      } else if (opt.isCorrect && !isSelected) {
                        bg = '#1f2937'; borderColor = '#22c55e';
                        icon = <span style={{ color: '#22c55e' }}>✓</span>;
                      } else if (!opt.isCorrect && isSelected) {
                        bg = '#7f1d1d'; borderColor = '#ef4444';
                        cbBg = '#ef4444'; cbBorder = '#ef4444';
                        icon = <span style={{ color: '#ef4444' }}>✗</span>;
                      }
                    } else if (isSelected) {
                      bg = '#1e3a5f'; borderColor = '#3b82f6';
                    }
                    if (isOpKbCursor) {
                      if (!isSelected) { bg = '#170826'; borderColor = '#7c3aed'; cbBorder = '#7c3aed'; }
                      boxShadow = '0 0 0 3px #7c3aed33';
                    }

                    return (
                      <div key={i} onClick={() => toggleOption(i)} style={{ ...s.optionItem, background: bg, borderColor, boxShadow }}>
                        <div style={{ ...s.checkbox, borderColor: cbBorder, background: cbBg }}>
                          {isSelected && <IconCheck size={12} color="#fff" />}
                        </div>
                        <div style={{ flex: 1 }}>
                          <kbd style={{ marginRight: 8, background: 'rgba(255,255,255,0.1)', border: 'none', color: '#9ca3af' }}>{i + 1}</kbd>
                          {opt.text}
                        </div>
                        {evaluated && <div style={{ width: 20, textAlign: 'center', fontWeight: 'bold' }}>{icon}</div>}
                      </div>
                    );
                  })}
                </div>
                {isIncorrect && (
                  <div style={{ marginTop: 24, display: 'flex', justifyContent: 'center' }}>
                    <button onClick={copyAiPrompt} style={s.aiBtn}>
                      {aiCopied ? '✨ Prompt zkopírován do schránky!' : '🤖 Zeptat se AI (Zkopírovat prompt)'}
                    </button>
                  </div>
                )}
              </div>

              <div style={{ display: 'flex', alignItems: 'center', marginTop: 24, gap: 12, flexWrap: 'wrap' }}>
                <button onClick={prev} disabled={idx === 0} style={{ ...s.navIconBtn, opacity: idx === 0 ? 0.3 : 1 }}>
                  <IconChevronLeft size={18} />Předchozí
                </button>
                <button onClick={reshuffleCards} style={s.navIconBtn} title="Přehodit otázky — nové náhodné kolo">
                  <IconShuffle size={16} />Přehodit otázky
                </button>
                <div style={{ flex: 1, minWidth: 120, textAlign: 'center' }}>
                  {!evaluated ? (
                    <button onClick={handleEvaluate} style={s.evaluateBtn}>Vyhodnotit (Enter)</button>
                  ) : (
                    <button onClick={next} disabled={idx === total - 1} style={s.nextPrimaryBtn}>Další otázka (Enter)</button>
                  )}
                </div>
                <button onClick={next} disabled={idx === total - 1} style={{ ...s.navIconBtn, opacity: idx === total - 1 ? 0.3 : 1 }}>
                  Další<IconChevronRight size={18} />
                </button>
              </div>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div style={s.statsBox}>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 12 }}>
                  <span style={{ fontSize: 28, fontWeight: 700, color: '#fff' }}>{pct}%</span>
                  <span style={{ color: '#9ca3af', fontSize: 13 }}>postup</span>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  <div style={s.statsRow}><span style={{ ...s.statDot, background: '#22c55e' }} /><span>Správně</span><strong style={{ color: '#22c55e' }}>{stats.correct}</strong></div>
                  <div style={s.statsRow}><span style={{ ...s.statDot, background: '#f59e0b' }} /><span>Částečně</span><strong style={{ color: '#f59e0b' }}>{stats.partial}</strong></div>
                  <div style={s.statsRow}><span style={{ ...s.statDot, background: '#ef4444' }} /><span>Špatně</span><strong style={{ color: '#ef4444' }}>{stats.wrong}</strong></div>
                  <div style={s.statsRow}><span style={{ ...s.statDot, background: '#6b7280' }} /><span>Neodp.</span><strong style={{ color: '#9ca3af' }}>{stats.unanswered}</strong></div>
                </div>
              </div>
              <div style={s.statsBox}>
                <div style={{ fontSize: 12, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 12 }}>Mapa otázek</div>
                <CardGrid cards={cards} activeIdx={idx} onJump={setIdx} />
              </div>
            </div>
          </div>

          <div style={{ marginTop: 24, textAlign: 'center', color: '#6b7280', fontSize: 12 }}>
            Zkratky: <kbd>Enter</kbd> vyhodnotit / další · <kbd>←</kbd> <kbd>→</kbd> navigace · <kbd>↑</kbd> <kbd>↓</kbd> vybrat odpověď · <kbd>Shift</kbd> označit · <kbd>Esc</kbd> ukončit
          </div>
        </div>
      </main>
    </div>
  );
}

function TestingTab({ sets }) {
  const [selections, setSelections] = useState({});
  const [activeTest, setActiveTest] = useState(null);
  const [testKey, setTestKey] = useState(0);
  const [savedSelections, setSavedSelections] = useState(null);
  const [generatedInfo, setGeneratedInfo] = useState(null);

  useEffect(() => {
    setSelections(prev => {
      const next = {};
      sets.forEach(set => {
        next[set.id] = prev[set.id] || { enabled: false, count: 0 };
      });
      return next;
    });
  }, [sets]);

  const toggleSet = (id) => {
    setSelections(prev => ({ ...prev, [id]: { ...prev[id], enabled: !prev[id].enabled } }));
  };

  const updateCount = (id, raw, max) => {
    const num = raw === '' ? 0 : Math.min(max, Math.max(0, parseInt(raw) || 0));
    setSelections(prev => ({ ...prev, [id]: { ...prev[id], count: num } }));
  };

  const totalCount = sets.reduce((sum, set) => {
    const sel = selections[set.id];
    return sum + (sel?.enabled ? (sel.count || 0) : 0);
  }, 0);

  const buildCards = (sels) => {
    const cards = [];
    sets.forEach(set => {
      const sel = sels[set.id];
      if (!sel?.enabled || !sel.count) return;
      const shuffled = [...set.cards];
      shuffleArray(shuffled);
      shuffled.slice(0, sel.count).forEach(c => cards.push({ ...c, status: 'unanswered' }));
    });
    shuffleArray(cards);
    return cards;
  };

  const handleGenerate = () => {
    if (totalCount === 0) return;
    const sels = { ...selections };
    setSavedSelections(sels);
    setGeneratedInfo({
      total: totalCount,
      sets: sets.filter(s => sels[s.id]?.enabled && sels[s.id]?.count > 0)
               .map(s => ({ name: s.name, count: sels[s.id].count })),
    });
  };

  const handleStart = () => {
    const cards = buildCards(savedSelections);
    setActiveTest(cards);
    setTestKey(k => k + 1);
  };

  const handleRegenerate = () => {
    if (!savedSelections) return;
    const cards = buildCards(savedSelections);
    setActiveTest(cards);
    setTestKey(k => k + 1);
  };

  if (activeTest) {
    return <TestingView key={testKey} cards={activeTest} onExit={() => setActiveTest(null)} onRegenerate={handleRegenerate} />;
  }

  if (sets.length === 0) {
    return (
      <div style={s.container}>
        <div style={s.emptyState}>
          <IconFile size={48} />
          <h2 style={{ ...s.h2, marginTop: 16 }}>Žádné sady k dispozici</h2>
          <p style={s.subtitle}>Nejdříve vytvořte alespoň jeden test na záložce Domů.</p>
        </div>
      </div>
    );
  }

  return (
    <div style={s.container}>
      <h1 style={s.h1}>Testování</h1>
      <p style={s.subtitle}>Vyber sady a nastav počet otázek z každé</p>

      <div style={s.card}>
        <label style={s.label}>Výběr sad</label>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {sets.map(set => {
            const sel = selections[set.id] || { enabled: false, count: 0 };
            return (
              <div key={set.id} onClick={() => toggleSet(set.id)}
                style={{
                  display: 'flex', alignItems: 'center', gap: 14,
                  padding: '12px 14px',
                  background: sel.enabled ? '#0c1a2e' : '#0a0a0a',
                  border: `1px solid ${sel.enabled ? '#2563eb' : '#1f2937'}`,
                  borderRadius: 10, cursor: 'pointer', transition: 'all 0.15s',
                }}>
                <div style={{
                  width: 38, height: 22, borderRadius: 11, flexShrink: 0,
                  background: sel.enabled ? '#2563eb' : '#374151',
                  position: 'relative', transition: 'background 0.2s',
                }}>
                  <div style={{
                    width: 16, height: 16, borderRadius: '50%', background: '#fff',
                    position: 'absolute', top: 3, left: sel.enabled ? 19 : 3,
                    transition: 'left 0.2s',
                  }} />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ color: sel.enabled ? '#fff' : '#9ca3af', fontWeight: 600, fontSize: 14, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                    {set.name}
                  </div>
                  <div style={{ color: '#6b7280', fontSize: 12 }}>{set.cards.length} otázek celkem</div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, opacity: sel.enabled ? 1 : 0.3 }}
                  onClick={e => e.stopPropagation()}>
                  <input
                    type="text" inputMode="numeric" pattern="[0-9]*"
                    value={sel.count > 0 ? sel.count : ''}
                    placeholder="0"
                    disabled={!sel.enabled}
                    onChange={e => updateCount(set.id, e.target.value.replace(/\D/g, ''), set.cards.length)}
                    style={{ ...s.input, width: 60, padding: '5px 8px', textAlign: 'center', fontSize: 14 }}
                  />
                  <span style={{ color: '#6b7280', fontSize: 12, flexShrink: 0 }}>z {set.cards.length}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ display: 'flex', alignItems: 'center', marginBottom: 16 }}>
        <span style={{ color: '#9ca3af', fontSize: 14 }}>
          Celkem: <strong style={{ color: totalCount > 0 ? '#60a5fa' : '#6b7280', fontSize: 16 }}>{totalCount}</strong> otázek
        </span>
      </div>

      <button onClick={handleGenerate} disabled={totalCount === 0}
        style={{ ...s.primaryBtn, opacity: totalCount === 0 ? 0.4 : 1, cursor: totalCount === 0 ? 'not-allowed' : 'pointer' }}>
        Vygenerovat test ({totalCount} otázek)
      </button>

      {generatedInfo && (
        <div style={{ marginTop: 20, background: '#0c1a2e', border: '1px solid #1e3a5f', borderRadius: 12, padding: 20 }}>
          <div style={{ color: '#60a5fa', fontWeight: 700, fontSize: 15, marginBottom: 14 }}>Test připraven</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 0, marginBottom: 14 }}>
            {generatedInfo.sets.map((s, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '7px 0', borderBottom: '1px solid #1f2937', fontSize: 13 }}>
                <span style={{ color: '#d1d5db' }}>{s.name}</span>
                <span style={{ color: '#60a5fa', fontWeight: 600 }}>{s.count} otázek</span>
              </div>
            ))}
          </div>
          <div style={{ color: '#9ca3af', fontSize: 13, marginBottom: 16 }}>
            Celkem: <strong style={{ color: '#fff' }}>{generatedInfo.total}</strong> otázek
          </div>
          <button onClick={handleStart} style={{ ...s.primaryBtn, display: 'inline-flex', alignItems: 'center', gap: 8, width: 'auto', padding: '12px 28px' }}>
            <IconPlay size={15} />Spustit test
          </button>
        </div>
      )}
    </div>
  );
}

function TestingView({ cards: initialCards, onExit, onRegenerate }) {
  const [idx, setIdx] = useState(0);
  const [selectedOptions, setSelectedOptions] = useState([]);
  const [evaluated, setEvaluated] = useState(false);
  const [aiCopied, setAiCopied] = useState(false);
  const [currentOptions, setCurrentOptions] = useState([]);
  const [cardResults, setCardResults] = useState(() => initialCards.map(c => ({ ...c })));
  const [opKbMode, setOpKbMode] = useState(false);
  const [opKbIdx, setOpKbIdx] = useState(0);
  const opKbModeRef = useRef(false);
  const opKbIdxRef = useRef(0);
  useEffect(() => { opKbModeRef.current = opKbMode; }, [opKbMode]);
  useEffect(() => { opKbIdxRef.current = opKbIdx; }, [opKbIdx]);

  const card = cardResults[idx];
  const total = cardResults.length;
  const stats = countStats(cardResults);
  const answered = stats.correct + stats.partial + stats.wrong;
  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;
  const allAnswered = answered === total;

  const next = useCallback(() => setIdx(i => Math.min(i + 1, total - 1)), [total]);
  const prev = useCallback(() => setIdx(i => Math.max(i - 1, 0)), []);

  useEffect(() => {
    setSelectedOptions([]);
    setEvaluated(false);
    setAiCopied(false);
    setOpKbMode(false);
    setOpKbIdx(0);
    if (card && card.options) {
      const shuffled = [...card.options];
      shuffleArray(shuffled);
      setCurrentOptions(shuffled);
    }
  }, [idx]);

  const toggleOption = useCallback((optIdx) => {
    if (evaluated) return;
    setSelectedOptions(prev => prev.includes(optIdx) ? prev.filter(i => i !== optIdx) : [...prev, optIdx]);
  }, [evaluated]);

  const handleEvaluate = useCallback(() => {
    if (evaluated) { next(); return; }
    let correctTotal = 0, selectedCorrect = 0, selectedWrong = 0;
    currentOptions.forEach((opt, i) => {
      if (opt.isCorrect) correctTotal++;
      if (selectedOptions.includes(i)) {
        if (opt.isCorrect) selectedCorrect++;
        else selectedWrong++;
      }
    });
    let status = 'wrong';
    if (selectedWrong === 0 && selectedCorrect === correctTotal && correctTotal > 0) status = 'correct';
    else if (selectedWrong === 0 && selectedCorrect > 0) status = 'partial';
    setCardResults(prev => prev.map((c, i) => i === idx ? { ...c, status } : c));
    setEvaluated(true);
  }, [evaluated, currentOptions, selectedOptions, idx, next]);

  const copyAiPrompt = () => {
    let promptText = `Ahoj, potřebuji vysvětlit následující otázku z testu:\n\nOtázka: ${card.question}\n\nMožnosti:\n`;
    currentOptions.forEach((opt, i) => {
      const isSel = selectedOptions.includes(i);
      promptText += `${opt.isCorrect ? '[SPRÁVNÁ]' : '[ŠPATNÁ]'} — ${opt.text} ${isSel ? '(Tuto možnost jsem ZAŠKRTL)' : '(Tuto možnost jsem NEZAŠKRTL)'}\n`;
    });
    let cT = 0, sC = 0, sW = 0;
    currentOptions.forEach((opt, i) => {
      if (opt.isCorrect) cT++;
      if (selectedOptions.includes(i)) { if (opt.isCorrect) sC++; else sW++; }
    });
    const st = (sW === 0 && sC === cT && cT > 0) ? 'correct' : (sW === 0 && sC > 0 ? 'partial' : 'wrong');
    promptText += `\nMoje odpověď byla vyhodnocena jako: ${st === 'partial' ? 'ČÁSTEČNĚ SPRÁVNÁ' : 'ŠPATNÁ'}.\n\nMůžeš mi prosím podrobně vysvětlit, proč je správná odpověď správná a proč ty ostatní jsou nesprávné?`;
    navigator.clipboard.writeText(promptText);
    setAiCopied(true);
    setTimeout(() => setAiCopied(false), 2500);
  };

  useEffect(() => {
    const onMouse = () => { setOpKbMode(false); };
    window.addEventListener('mousedown', onMouse);
    return () => window.removeEventListener('mousedown', onMouse);
  }, []);

    const h = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); handleEvaluate(); }
      else if (e.key === 'ArrowRight') { setOpKbMode(false); next(); }
      else if (e.key === 'ArrowLeft') { setOpKbMode(false); prev(); }
      else if (e.key === 'Escape') onExit();
      else if ((e.key === 'ArrowUp' || e.key === 'ArrowDown') && !evaluated) {
        e.preventDefault();
        if (!opKbModeRef.current) { setOpKbMode(true); setOpKbIdx(0); }
        else { setOpKbIdx(p => e.key === 'ArrowUp' ? Math.max(0, p - 1) : Math.min(currentOptions.length - 1, p + 1)); }
      } else if (e.key === 'Shift' && opKbModeRef.current && !evaluated) {

    return () => window.removeEventListener('keydown', h);
  }, [evaluated, next, prev, handleEvaluate, onExit, toggleOption, currentOptions.length]);

  let isIncorrect = false;
  if (evaluated) {
    let cT = 0, sC = 0, sW = 0;
    currentOptions.forEach((opt, i) => {
      if (opt.isCorrect) cT++;
      if (selectedOptions.includes(i)) { if (opt.isCorrect) sC++; else sW++; }
    });
    if (!((sW === 0 && sC === cT && cT > 0))) isIncorrect = true;

  const [idx, setIdx] = useState(0);

  const [aiCopied, setAiCopied] = useState(false);
  const [currentOptions, setCurrentOptions] = useState([]);
  const [opKbMode, setOpKbMode] = useState(false);
  const [opKbIdx, setOpKbIdx] = useState(0);
  const opKbModeRef = useRef(false);
  const opKbIdxRef = useRef(0);
  useEffect(() => { opKbModeRef.current = opKbMode; }, [opKbMode]);
  useEffect(() => { opKbIdxRef.current = opKbIdx; }, [opKbIdx]);

  const card = set.cards[idx];
  const stats = countStats(set.cards);
  const total = set.cards.length;
  const answered = stats.correct + stats.partial + stats.wrong;
  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;

  const next = useCallback(() => { setIdx((i) => Math.min(i + 1, total - 1)); }, [total]);
  const prev = useCallback(() => { setIdx((i) => Math.max(i - 1, 0)); }, []);

  const jumpToRandom = () => {
    if (total <= 1) return;
    let rand = idx;
    while (rand === idx) {
      rand = Math.floor(Math.random() * total);
    }
    setIdx(rand);
  };

  useEffect(() => {
    setSelectedOptions([]);
    setEvaluated(false);
    setAiCopied(false);
    setOpKbMode(false);
    setOpKbIdx(0);

    if (card && card.options) {
      const shuffled = [...card.options];

      setCurrentOptions(shuffled);

  }, [idx]);

  const toggleOption = useCallback((optIdx) => {
    if (evaluated) return;
    setSelectedOptions(prev => 
      prev.includes(optIdx) ? prev.filter(i => i !== optIdx) : [...prev, optIdx]
    );
  }, [evaluated]);

  const handleEvaluate = useCallback(() => {
    if (evaluated) {
      next();
      return;
    }
    
    let correctTotal = 0;
    let selectedCorrect = 0;
    let selectedWrong = 0;

    currentOptions.forEach((opt, i) => {
      if (opt.isCorrect) correctTotal++;
      if (selectedOptions.includes(i)) {
        if (opt.isCorrect) selectedCorrect++;
        else selectedWrong++;
      }
    });

    let status = 'wrong';
    if (selectedWrong === 0 && selectedCorrect === correctTotal && correctTotal > 0) {
      status = 'correct';
    } else if (selectedWrong === 0 && selectedCorrect > 0) {
      status = 'partial';
    } else if (selectedOptions.length === 0) {

function ImportExportTab({ sets, onImport }) {
  const [importData, setImportData] = useState(null);
  const [importError, setImportError] = useState('');
  const [importDone, setImportDone] = useState(false);
  const [exportDone, setExportDone] = useState(false);
  const fileRef = useRef(null);

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(sets, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tester_zaloha_${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setExportDone(true);
    setTimeout(() => setExportDone(false), 2500);
  };

  const handleFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImportDone(false);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!Array.isArray(parsed)) throw new Error();
        parsed.forEach(s => { if (!s.id || !s.name || !Array.isArray(s.cards)) throw new Error(); });
        setImportData(parsed);
        setImportError('');
      } catch {
        setImportError('Soubor není platná záloha Testeru.');
        setImportData(null);
      }
    };
    reader.readAsText(file, 'UTF-8');
  };

  const handleImport = (mode) => {
    if (!importData) return;
    onImport(importData, mode);
    setImportData(null);
    setImportDone(true);
    if (fileRef.current) fileRef.current.value = '';
    setTimeout(() => setImportDone(false), 3000);
  };

  const totalQuestions = sets.reduce((sum, s) => sum + s.cards.length, 0);
  const importQuestions = importData ? importData.reduce((sum, s) => sum + s.cards.length, 0) : 0;

  return (
    <div style={s.container}>
      <h1 style={s.h1}>Import / Export</h1>
      <p style={s.subtitle}>Přenášej sady mezi zařízeními — stáhni zálohu a nahraj ji jinde</p>

      <div style={s.card}>
        <h2 style={s.h2}>Export — stáhnout zálohu</h2>
        <p style={{ color: '#9ca3af', fontSize: 14, marginBottom: 16 }}>
          Všechny tvoje sady se uloží do jednoho souboru. Ten pak nahraj na tabletu nebo jiném počítači.
        </p>
        {sets.length === 0 ? (
          <div style={{ color: '#6b7280', fontSize: 14 }}>Žádné sady k exportu. Nejdřív vytvoř nějaký test.</div>
        ) : (
          <>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 20 }}>
              {sets.map(set => (
                <div key={set.id} style={{ background: '#0a0a0a', border: '1px solid #1f2937', borderRadius: 8, padding: '6px 12px', fontSize: 13 }}>
                  <span style={{ color: '#fff' }}>{set.name}</span>
                  <span style={{ color: '#6b7280', marginLeft: 8 }}>{set.cards.length} otázek</span>
                </div>
              ))}
            </div>
            <div style={{ color: '#9ca3af', fontSize: 13, marginBottom: 16 }}>
              Celkem: <strong style={{ color: '#fff' }}>{sets.length}</strong> {sets.length === 1 ? 'sada' : sets.length < 5 ? 'sady' : 'sad'}, <strong style={{ color: '#fff' }}>{totalQuestions}</strong> otázek
            </div>
            <button onClick={handleExport} style={{ ...s.primaryBtn, width: 'auto', padding: '12px 24px', display: 'inline-flex', alignItems: 'center', gap: 8 }}>
              <IconDownload size={16} />{exportDone ? '✓ Staženo!' : 'Stáhnout zálohu (.json)'}
            </button>
          </>
        )}
      </div>

      <div style={s.card}>
        <h2 style={s.h2}>Import — nahrát zálohu</h2>
        <p style={{ color: '#9ca3af', fontSize: 14, marginBottom: 16 }}>
          Nahraj zálohu (.json) ze zálohy. Sady přidáš k existujícím nebo jimi nahradíš vše.
        </p>

        <input ref={fileRef} type="file" accept=".json" onChange={handleFile} style={{ display: 'none' }} />
        <button onClick={() => { setImportData(null); setImportError(''); fileRef.current?.click(); }} style={s.fileBtn}>
          <IconUpload size={14} />Vybrat soubor zálohy (.json)
        </button>

        {importError && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: '#ef4444', fontSize: 14, marginTop: 12 }}>
            <IconAlert size={15} />{importError}
          </div>
        )}

        {importDone && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: '#22c55e', fontSize: 14, marginTop: 12 }}>
            <IconCheck size={15} />Sady byly úspěšně importovány!
          </div>
        )}

        {importData && (
          <div style={{ marginTop: 16 }}>
            <div style={{ ...s.parseStatus, marginBottom: 16 }}>
              <div style={s.parseStatusRow}>
                <IconCheck size={15} />
                <span>Nalezeno <strong>{importData.length}</strong> {importData.length === 1 ? 'sada' : importData.length < 5 ? 'sady' : 'sad'} · <strong>{importQuestions}</strong> otázek</span>
              </div>
            </div>
            <div style={{ marginBottom: 16 }}>
              {importData.map((set, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid #1f2937', fontSize: 13 }}>
                  <span style={{ color: '#d1d5db' }}>{set.name}</span>
                  <span style={{ color: '#6b7280' }}>{set.cards.length} otázek</span>
                </div>
              ))}
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => handleImport('add')} style={{ ...s.primaryBtn, flex: 1 }}>
                Přidat k existujícím
              </button>
              <button onClick={() => { if (confirm('Smazat všechny existující sady a nahradit importem?')) handleImport('replace'); }}
                style={{ ...s.iconBtn, flex: 1, padding: '10px 16px', fontSize: 13, justifyContent: 'center', display: 'flex' }}>
                Nahradit vše
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function GuideTab() {
  const example = `Text první otázky
+ první správná odpověď
- první špatná odpověď
- druhá špatná odpověď

Text druhé otázky
- první špatná odpověď
+ první správná odpověď
+ druhá správná odpověď`;

  const [copied, setCopied] = useState(false);
  const copyExample = () => {
    navigator.clipboard.writeText(example);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  return (
    <div style={s.container}>
      <h1 style={s.h1}>Návod</h1>
      <p style={s.subtitle}>Jak nahrát otázky (Formát VŠE Testeru)</p>

      <div style={s.card}>
        <h2 style={s.h2}>1. Formát souboru</h2>
        <p>Soubory je nutné nahrávat ve stejném formátu jako v aplikaci VŠE Tester.</p>
        <ul>
          <li>Struktura zahrnuje jednotlivé otázky a odpovědi na samostatných řádcích.</li>
          <li><strong>Důležité:</strong> Otázku ani odpovědi nezalamujte na více řádků.</li>
          <li>Správné odpovědi jsou označeny symbolem <code>+</code>.</li>
          <li>Špatné odpovědi symbolem <code>-</code>.</li>
          <li>Jednotlivé otázky oddělujte volným (prázdným) řádkem.</li>
        </ul>
      </div>

      <div style={s.card}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <h2 style={{ ...s.h2, margin: 0 }}>2. Příklad</h2>
          <button onClick={copyExample} style={s.smallBtn}>{copied ? 'Zkopírováno!' : 'Kopírovat'}</button>
        </div>
        <pre style={s.codeBlock}>{example}</pre>
      </div>

      <div style={s.card}>
        <h2 style={s.h2}>3. Vyhodnocování</h2>
        <p>V testu zaklikejte všechny odpovědi, o kterých si myslíte, že jsou správné. Pak klikněte na <strong>Vyhodnotit</strong> (nebo stiskněte Enter). Aplikace vám ukáže výsledek:</p>
        <ul>
          <li><span style={{ color: '#22c55e' }}><strong>Správně</strong></span> — Označili jste všechny správné možnosti a žádnou špatnou.</li>
          <li><span style={{ color: '#f59e0b' }}><strong>Částečně</strong></span> — Označili jste jen některé ze správných možností, ale žádnou špatnou.</li>
          <li><span style={{ color: '#ef4444' }}><strong>Špatně</strong></span> — Označili jste alespoň jednu špatnou odpověď, nebo jste neoznačili nic.</li>
        </ul>
      </div>
    </div>
  );
}
